# --- 基础设置 ---
set -g status-style bg=default
setw -g mode-keys vi

# 4. 复制模式与粘贴 (Copy Mode)
# 优化：采用通用系统的复制粘贴肌肉记忆，全在左手下排，极度舒适
bind -n M-c copy-mode
bind -n M-v paste-buffer

# 复制模式内部的按键 (Copy Mode VI key table)
# 保持不变：v和y是Vim标准按键，已经是人体工学的最优解，无需更改
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i && tmux display-message 'Content copied to clipboard!'"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# 5. 窗口管理 (Window Management)
# 重命名 -> Alt + r (Rename，保持不变，左手食指/中指好发力)
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# 创建新窗口 -> Alt + t (Tab，借用浏览器新建标签页的肌肉记忆)
bind -n M-t new-window -c "#{pane_current_path}"

# 关闭当前面板/窗口 -> Alt + w (Window/Wipe，借用浏览器关闭标签页的肌肉记忆)
bind -n M-w kill-pane

bind -n M-l source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# Alt + 左右方向键 切换窗口 (更直观的物理方向导航)
bind -n M-Left previous-window
bind -n M-Right next-window

# --- 脚本与工具绑定 ---
# 优化：将脚本呼出移至右手区，平衡左手在窗口管理上的负担
# Quick Prompts -> Alt + p (取 Prompt 首字母，右手小指/无名指)
bind -n M-p display-popup -E -w 60% -h 60% "bash $HOME/.config/tmux/scripts/quick-prompts/quick-prompts.sh"

# Quick Commands -> Alt + o (取 cOmmand 或 Options 含义，紧挨着 p 键)
bind -n M-o display-popup -E -w 60% -h 60% "bash $HOME/.config/tmux/scripts/quick-commands/quick-commands.sh"
