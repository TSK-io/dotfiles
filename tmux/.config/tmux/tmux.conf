set -g status-style bg=default
set -g mouse on
set -g base-index 1
setw -g mode-keys vi

bind -n C-a copy-mode
bind -n C-v paste-buffer

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i && tmux display-message 'Content copied to clipboard!'"
# Mouse copy stays in history view, but clears the selection to avoid stale highlights.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -selection clipboard -i && tmux display-message 'Content copied to clipboard!'"
bind-key -T copy-mode-vi Escape send-keys -X cancel

bind -n C-w kill-pane

unbind -nq C-t
unbind -nq C-h
unbind -nq C-l
unbind -q c

bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4


bind -n M-z display-popup -E -w 60% -h 60% "bash $HOME/.config/tmux/scripts/quick-prompts/quick-prompts.sh"
bind -n M-x display-popup -E -w 60% -h 60% "bash $HOME/.config/tmux/scripts/quick-commands/quick-commands.sh"
