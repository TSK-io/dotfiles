# --- 基础设置 ---
set -g status-style bg=default 
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi

set -g status-right "#(hostname -I | awk '{print $1}') #(cat /sys/class/power_supply/BAT0/capacity)% %m-%d %H:%M"

# 虽然我们主要用 Alt 键，但保留一个 Prefix 以备不时之需 (如嵌套 tmux 时)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- 核心：去前缀化绑定 (使用 -n 参数) ---
# 注意：M 代表 Alt 键 (Meta)

# 1. 窗口分割 (Split) -> Alt + \ 和 Alt + -
unbind %
unbind '"'
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

bind -n M-Space select-pane -t :.+

# 3. 面板调整大小 (Resize) -> Alt + Shift + 方向键
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# 4. 复制模式与粘贴 (Copy Mode)
# 建议：使用 Alt + v 进入复制模式，Alt + p 粘贴
bind -n M-v copy-mode
bind -n M-p paste-buffer

# 复制模式内部的按键 (Copy Mode VI key table)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i && tmux display-message 'Content copied to clipboard!'"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# 5. 窗口管理 (Window Management)
# 重命名 -> Alt + r
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# 创建新窗口 -> Alt + c
bind -n M-c new-window -c "#{pane_current_path}"

# 关闭当前面板/窗口 -> Alt + x
bind -n M-x kill-pane

# --- 补充的高频操作 (全部去前缀) ---

# 1. 最大化/恢复当前面板 (Zoom) -> Alt + z
bind -n M-z resize-pane -Z

# 2. 会话选择器 (Session Switcher) -> Alt + s
bind -n M-s choose-session

# 3. 快速重载配置文件 -> Alt + R (Shift + r)
bind -n M-R source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# 6. 窗口切换 (Switch Window) - 修改部分
bind -n M-q previous-window
bind -n M-w next-window

# --- 脚本与工具绑定 ---

bind -n M-/ display-popup -E -w 60% -h 60% "bash $HOME/.config/tmux/scripts/quick-prompts/quick-prompts.sh"

# --- MPC 音乐云端控制 (去前缀化) ---

# 给 Tmux 内部进程专门指定 MPD 服务器地址
set-environment -g MPD_HOST "152.42.231.180"

# Alt + m : 播放 / 暂停 (Toggle)
bind -n M-m run-shell 'mpc toggle >/dev/null 2>&1; tmux display-message "⏯️  $(mpc current)"'

# Alt + . : 下一首 (Next)
bind -n M-. run-shell 'mpc next >/dev/null 2>&1; tmux display-message "⏭️  $(mpc current)"'

# Alt + , : 上一首 (Prev)
bind -n M-, run-shell 'mpc prev >/dev/null 2>&1; tmux display-message "⏮️  $(mpc current)"'

bind -n C-o display-popup -E -w 60% -h 60% "bash $HOME/.config/tmux/scripts/quick-commands/quick-commands.sh"

# --- 跨平台无感收音机 (自动拉起 mpv) ---
# 当创建 tmux 会话时，检查 mpv 是否在运行，如果不在，则在后台静默启动拉流
set-hook -g session-created 'run-shell -b "pgrep -x mpv >/dev/null 2>&1 || mpv --no-video http://152.42.231.180:8001 >/dev/null 2>&1"'
