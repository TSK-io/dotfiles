name: Daily Calendar Notifier

on:
  schedule:
    # 每天早上 8:00 (北京时间/UTC+8) 运行。
    # 提示：Cron 的时间是 UTC 时间。UTC 的 00:00 是北京时间的 08:00。
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在网页端手动点击运行，方便测试

jobs:
  check_and_notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write # 授予创建 Issue 的权限
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run calendar check
        id: calendar
        run: |
          # 进入你的文件所在目录
          cd docs/calendar
          
          # 运行脚本并将输出保存到变量
          OUTPUT=$(python check_events.py)
          
          # 将多行输出安全地写入 GITHUB_OUTPUT，供下一步使用
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "events<<$EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Send Notification via GitHub Issue
        # 只有当 Python 脚本有输出（今天有事件）时，才执行此步骤
        if: steps.calendar.outputs.events != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 创建一个 Issue 并分配给你自己，这会在你的 GitHub iOS App 上触发推送通知
          gh issue create \
            --title "📅 今日提醒: $(date +'%Y-%m-%d')" \
            --body "@${{ github.actor }} 你好！今天有以下事件需要处理：
            
            ${{ steps.calendar.outputs.events }}" \
            --assignee "${{ github.actor }}"
