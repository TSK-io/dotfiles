# ==========================================
# MPD (Music Player Daemon) 极简云端流媒体配置
# ==========================================

# 1. 核心文件与数据库路径 (Debian 默认路径)
music_directory    "/mnt/data/Music"
db_file            "/var/lib/mpd/tag_cache"
state_file         "/var/lib/mpd/state"
playlist_directory "/var/lib/mpd/playlists"

# 2. 遥控器配置 (监听 6600 端口，供外部 mpc 连接控制)
bind_to_address    "0.0.0.0"
port               "6600"

# 3. 收音机配置 (监听 8001 端口，供外部 mpv 拉取音频流)
audio_output {
    type        "httpd"
    name        "My HTTP Stream"
    encoder     "vorbis"       # 兼容性最好，不依赖额外解码包
    port        "8001"         # 避开常用的 8000 端口，防止冲突
    bitrate     "128"          # 128kbps 足够日常听且省流量
    format      "44100:16:2"
    always_on   "yes"          # 客户端断开时流不停止，保证无缝重连
    tags        "yes"
}
